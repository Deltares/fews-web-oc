<!doctype html>
<html lang="en">
  <head>
    <title>SMART Polder Control Dashboard Status Table</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.materialdesignicons.com/5.4.55/css/materialdesignicons.min.css"
      rel="stylesheet"
    />
    <style>
      article {
        font-family: 'RO-Sans', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        min-width: 300px;
        max-width: 1200px;
        margin: 0 auto;
      }
      p {
        font-size: 1em;
      }
      .content {
        justify-content: space-around;
        align-items: center;
        display: flex;
        flex-direction: row;
      }
      .box {
        padding-right: 1px;
        align-items: center;
      }
      table#tableStyle1 {
        font-size: 0.9em;
        width: 100%;
        border-spacing: 0px;
        border-collapse: collapse;
      }
      table#tableStyle1 td,
      table#tableStyle1 th {
        padding: 5px;
        text-align: left;
      }
      table#tableStyle1 th {
        font-weight: bold;
        text-align: left;
        vertical-align: bottom;
        color: #000000;
        background-color: #eeeeee;
      }
      table#tableStyle1 tr:nth-child(odd) {
        background-color: #f8f8f8;
      }
      .tableStyle1_data td,
      .tableStyle1_data_split td,
      .tableStyle1_data_end td {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <article>
      <div class="content">
        <table id="tableStyle1">
          <tr>
            <th><i class="mdi mdi-clock-outline"></i> Time</th>
            <th>Now</th>
            <th><i class="mdi mdi-plus"></i>6h</th>
            <th><i class="mdi mdi-plus"></i>12h</th>
          </tr>
          <tr>
            <td><i class="mdi mdi-water-check"></i> Setpoint</td>
            <td>97.30</td>
            <td>97.05</td>
            <td>97.25</td>
          </tr>
          <tr>
            <th colspan="4">DPS Water Level [m]</th>
          </tr>
          <tr>
            <td><i class="mdi mdi-water"></i> Reactive</td>
            <td>97.31</td>
            <td>97.31</td>
            <td>98.93</td>
          </tr>
          <tr>
            <td><i class="mdi mdi-water-plus"></i> Proactive</td>
            <td>97.31</td>
            <td>97.09</td>
            <td>98.76</td>
          </tr>
          <tr>
            <td><i class="mdi mdi-chart-line"></i> Performance</td>
            <td>0</td>
            <td>-0.22</td>
            <td>-0.17</td>
          </tr>
          <tr>
            <th colspan="4">DPS Flow Rate [m&#179;/s]</th>
          </tr>
          <tr>
            <td><i class="mdi mdi-water"></i> Reactive</td>
            <td>0</td>
            <td>0</td>
            <td>16</td>
          </tr>
          <tr>
            <td><i class="mdi mdi-water-plus"></i> Proactive</td>
            <td>0</td>
            <td>12</td>
            <td>16</td>
          </tr>
          <tr>
            <th colspan="4">SWCP [m]</th>
          </tr>
          <tr>
            <td><i class="mdi mdi-water"></i> Reactive</td>
            <td>97.31</td>
            <td>97.31</td>
            <td>98.93</td>
          </tr>
          <tr>
            <td><i class="mdi mdi-water-plus"></i> Proactive</td>
            <td>97.31</td>
            <td>97.30</td>
            <td>98.76</td>
          </tr>
          <tr>
            <td><i class="mdi mdi-chart-line"></i> Performance</td>
            <td>0</td>
            <td>-0.01</td>
            <td>-0.17</td>
          </tr>
        </table>
      </div>
    </article>
  </body>
</html>
