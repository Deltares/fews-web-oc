# SonarCloud Configuration for Vue.js + TypeScript Project
# https://docs.sonarcloud.io/

# Project identification
sonar.projectKey=Deltares_fews-web-oc
sonar.organization=deltares
sonar.projectName=FEWS Web OC
sonar.projectVersion=1.0.0

# Source code
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Test configuration
sonar.tests=tests,e2e
sonar.testExecutionReportPaths=test-results/junit.xml

# Coverage reports (Playwright/Istanbul)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# File exclusions
sonar.exclusions=**/*.spec.ts,**/*.test.ts,**/node_modules/**,**/dist/**,**/build/**,**/coverage/**
sonar.test.exclusions=

# TypeScript/JavaScript specific configuration
sonar.javascript.file.suffixes=.js,.jsx,.ts,.tsx,.vue
sonar.typescript.tsconfigPath=tsconfig.json

# Vue.js specific settings
sonar.vue.eslintConfigPath=.eslintrc.json
sonar.vue.useeslint=true

# Code coverage settings
sonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/tests/**,**/e2e/**,**/node_modules/**

# Analysis settings
sonar.verbose=false
sonar.links.homepage=https://github.com/Deltares/fews-web-oc
sonar.links.ci=
sonar.links.issue=
sonar.links.scm=https://github.com/Deltares/fews-web-oc

# Disable rules that don't apply to Vue.js/TypeScript
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=*
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.vue
